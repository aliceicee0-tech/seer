# CI Nexus — lance la suite de tests Django sur chaque push / pull request.
# Évite de merger une régression (les tests couvrent les failles critiques
# B1/B2/B3 et le moteur financier complet).

name: Tests

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      # PostgreSQL identique à la prod : les tests utilisent select_for_update,
      # ignoré sous SQLite — on teste donc sur la vraie cible.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SECRET_KEY: ci-dummy-secret-not-used-in-prod
      DJANGO_DEBUG: "True"          # DEBUG=True pour autoriser SQLite/les tests rapides
      DATABASE_URL: postgres://nexus:nexus@localhost:5432/nexus_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: System checks
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Tests
        run: python manage.py test --verbosity=2
