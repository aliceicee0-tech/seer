# =====================================================================
#  Nexus — stack de PRODUCTION (Oracle Cloud Always Free)
#
#  4 services :
#    - db         : PostgreSQL 16 (volume persistant)
#    - web        : Django + gunicorn (backend API)
#    - caddy      : reverse proxy + TLS auto + sert le frontend SPA
#    - scheduler  : boucle cron (verify_invariants, expire_orders, backup)
#
#  Usage :
#    cp .env.prod.example .env.prod   # puis éditez (SECRET_KEY, DOMAIN, DB...)
#    docker compose -f deploy/docker-compose.prod.yml --env-file .env.prod up -d
# =====================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: nexus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nexus}
      POSTGRES_USER: ${DB_USER:-nexus}
      # POSTGRES_PASSWORD OBLIGATOIRE — vient de .env.prod.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis dans .env.prod}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexus} -d ${DB_NAME:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # La base n'est pas exposée sur Internet — seul le réseau interne y accède.
    networks:
      - nexus-net
    # Plafond mémoire : sur un petit VPS (2-4 Go), empêche Postgres de tout
    # faire swapper. À ajuster si vous montez en RAM.
    mem_limit: 700m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: nexus-web
    restart: unless-stopped
    env_file:
      - ../.env.prod
    environment:
      # Force l'hôte DB interne au réseau Docker (écrase .env.prod si besoin).
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nexus-net
    # Le backend n'est exposé QUE sur le réseau interne. Caddy est le seul
    # point d'entrée public. (Ne pas publier le port 8000.)
    expose:
      - "8000"
    mem_limit: 500m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    build:
      context: ..
      dockerfile: deploy/caddy/Dockerfile
    container_name: nexus-caddy
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN requis dans .env.prod}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL requis dans .env.prod}
    ports:
      - "80:80"    # HTTP → Caddy redirige vers HTTPS (+ challenge Let's Encrypt)
      - "443:443"  # HTTPS (TLS terminé par Caddy, certificat Let's Encrypt auto)
    volumes:
      # Persistance des certificats TLS : sinon Caddy redemande un certif à chaque restart.
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
    networks:
      - nexus-net
    mem_limit: 200m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    # Même image que le backend, mais exécute la boucle cron au lieu de gunicorn.
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: nexus-scheduler
    restart: unless-stopped
    env_file:
      - ../.env.prod
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nexus-net
    # Surcharge l'entrypoint : on lance notre boucle cron au lieu de gunicorn.
    # Les backups DB sont montés en volume pour être conservés sur l'hôte.
    volumes:
      - backups:/backups
      - ./scripts:/scheduler-scripts:ro
    entrypoint: ["/bin/sh", "/scheduler-scripts/scheduler.sh"]
    mem_limit: 250m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nexus-net:
    driver: bridge

volumes:
  postgres-data:   # Données des utilisateurs (argent) — NE JAMAIS supprimer.
  caddy-data:      # Certificats TLS Let's Encrypt.
  caddy-config:
  backups:         # Sauvegardes pg_dump (rotatives, 7 jours).
